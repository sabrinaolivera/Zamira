  .card input, .card textarea {

    padding: 0.5rem;
    font-size: 1rem;
    border: 1px solid #ccc;

    margin-bottom: 1rem;
  }
  
  .card button {

    color: white;
    padding: 0.5rem 1rem;
    border: none;
    border-radius: 5px;
    font-size: 1.2rem;
    cursor: pointer;
  }
  
  .card button:hover {

  }

  @media (max-width: 600px) {

}
</style>
